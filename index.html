<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Akram Express Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0f1216] overflow-hidden selection:bg-none">

    <div id="grid-view" class="p-10 text-white">
        <h1 class="text-3xl font-bold mb-10">Magazines</h1>
        <div id="magazine-list" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
    </div>

    <div id="flipbook-view" class="fixed inset-0 bg-[#0f1216] z-50 hidden flex flex-col items-center justify-center">
        
        <button id="close-flipbook" class="absolute top-6 left-6 text-white/50 hover:text-white transition flex items-center gap-2 uppercase text-[11px] tracking-widest z-[100]">
            <span class="text-xl">&times;</span> Close
        </button>

        <div id="current-title" class="absolute top-8 text-white/30 uppercase text-[10px] tracking-[0.4em] z-[100]"></div>

        <div id="canvas" class="relative w-full h-full flex flex-col items-center justify-center p-4">
            <div id="flipbook-wrapper" class="relative">
                <div id="magazine" class="st-page-flip"></div>
            </div>

            <div class="mt-8 flex flex-col items-center gap-4">
                <div class="bg-[#1c2229]/80 backdrop-blur-md border border-white/5 rounded-full px-5 py-1.5 flex items-center gap-6 shadow-2xl">
                    <button id="prev-btn" class="text-white/60 hover:text-white text-2xl">&lsaquo;</button>
                    <span id="page-counter" class="text-white/40 text-[11px] font-mono min-w-[50px] text-center italic">0 / 0</span>
                    <button id="next-btn" class="text-white/60 hover:text-white text-2xl">&rsaquo;</button>
                </div>

                <div class="flex items-center gap-10 text-white/20">
                    <button id="zoom-out" class="hover:text-white transition text-2xl">−</button>
                    <button id="zoom-in" class="hover:text-white transition text-2xl">+</button>
                    <button id="full-screen" class="hover:text-white transition">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M3 3h7v2H5v5H3V3zM17 3h-7v2h5v5h2V3zM3 17h7v-2H5v-5H3v7zM17 17h-7v-2h5v-5h2v7z"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <audio id="flip-sound" src="flip.mp3"></audio>
    <script src="script.js"></script>
</body>
</html>
