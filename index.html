<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Premium Magazine Reader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0a0a0a] text-white overflow-hidden">

    <div id="grid-view" class="container mx-auto p-10 h-screen overflow-y-auto">
        <h1 class="text-3xl font-light tracking-widest mb-10 uppercase text-red-600">Digital Library</h1>
        <div id="magazine-list" class="grid grid-cols-2 md:grid-cols-4 gap-8"></div>
    </div>

    <div id="flipbook-view" class="fixed inset-0 bg-black/95 backdrop-blur-xl z-50 hidden flex flex-col items-center">
        
        <header class="w-full flex justify-between p-6 shrink-0">
            <button id="close-flipbook" class="text-xs tracking-widest text-gray-400 hover:text-white uppercase transition">&times; Close</button>
            <div id="current-title" class="text-[10px] font-bold tracking-[0.4em] text-gray-600 uppercase"></div>
            <div class="w-10"></div>
        </header>

        <main id="canvas" class="flex-grow w-full flex items-center justify-center relative overflow-hidden touch-none">
            <div id="flipbook-wrapper" class="relative">
                <div id="magazine" class="st-page-flip">
                    </div>
            </div>
        </main>

        <footer class="h-32 w-full flex items-center justify-center shrink-0">
            <div class="bg-white/5 border border-white/10 backdrop-blur-md rounded-2xl px-8 py-3 flex items-center gap-10">
                <div class="flex items-center gap-6">
                    <button id="prev-btn" class="text-3xl hover:text-red-500 transition">&lsaquo;</button>
                    <span id="page-counter" class="text-xs font-mono tracking-tighter text-gray-400">01 / 16</span>
                    <button id="next-btn" class="text-3xl hover:text-red-500 transition">&rsaquo;</button>
                </div>
                <div class="h-6 w-[1px] bg-white/10"></div>
                <div class="flex items-center gap-6 text-gray-400 font-light">
                    <button id="zoom-out" class="text-2xl hover:text-white transition">&minus;</button>
                    <button id="zoom-in" class="text-2xl hover:text-white transition">&plus;</button>
                </div>
            </div>
        </footer>
    </div>

    <audio id="flip-sound" src="flip.mp3" preload="auto"></audio>
    <script src="script.js"></script>
</body>
</html>
