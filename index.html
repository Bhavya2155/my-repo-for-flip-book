<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Akram Express | Pure Reader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#050608] text-white overflow-hidden selection:bg-none">

    <div id="grid-view" class="container mx-auto p-10 h-screen overflow-y-auto">
        <h1 class="text-3xl font-bold mb-10 text-gray-400">Magazines</h1>
        <div id="magazine-list" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-8"></div>
    </div>

    <div id="flipbook-view" class="fixed inset-0 bg-[#050608] z-50 hidden flex-col items-center justify-center">
        
        <button id="close-flipbook" class="absolute top-8 left-8 text-white/20 hover:text-white transition uppercase text-[10px] tracking-[0.3em] z-[110]">
            &times; Close
        </button>

        <div id="canvas" class="relative w-full h-full flex flex-col items-center justify-center p-4 touch-none">
            <div id="flipbook-wrapper" class="relative">
                <div id="magazine" class="st-page-flip"></div>
            </div>

            <div class="mt-12 z-[110]">
                <div class="bg-white/5 backdrop-blur-md rounded-full px-6 py-2 border border-white/5 shadow-2xl">
                    <span id="page-counter" class="text-[10px] font-mono tracking-[0.2em] text-gray-500 uppercase italic">0 / 0</span>
                </div>
            </div>
        </div>
    </div>

    <audio id="flip-sound" src="flip.mp3" preload="auto"></audio>
    <script src="script.js"></script>
</body>
</html>
